name: Validate Manifests

on:
  pull_request:
    paths:
      - 'services/**'
      - 'infrastructure/**'
      - 'argocd/**'

jobs:
  validate:
    name: Kustomize Build + Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz -C /usr/local/bin/

      - name: Build and validate all services
        run: |
          ERRORS=0
          for svc_dir in services/*/overlays/production; do
            if [ -d "$svc_dir" ]; then
              SVC=$(echo "$svc_dir" | cut -d/ -f2)
              echo "=== Validating: $SVC ==="
              if kustomize build "$svc_dir" > /tmp/manifests.yaml 2>&1; then
                kubeconform -strict -summary /tmp/manifests.yaml || ERRORS=$((ERRORS + 1))
              else
                echo "ERROR: kustomize build failed for $SVC"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::$ERRORS service(s) failed validation"
            exit 1
          fi
